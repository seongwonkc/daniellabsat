<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DanielLab · Student Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="config.js"></script>
<style>
:root {
  --bg:        #f5f4f2;
  --surface:   #ffffff;
  --border:    #e2e0dc;
  --accent:    #c8102e;
  --accent-dim:#a30d25;
  --text:      #111111;
  --muted:     #888888;
  --good:      #2a7a4f;
  --radius:    10px;
  --sans:      'DM Sans', sans-serif;
  --serif:     'DM Serif Display', serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.login-wrap {
  width: 100%;
  max-width: 400px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 32px;
}

.logo {
  font-family: var(--sans);
  font-size: 1.3rem;
  font-weight: 400;
  text-align: center;
  line-height: 1;
}
.logo .bold { color: var(--accent); font-weight: 700; }
.logo .sub  { display: block; font-size: 0.65rem; color: var(--muted); letter-spacing: .08em; margin-top: 4px; }

.card {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 36px 32px 32px;
}
.card-title {
  font-family: var(--serif);
  font-size: 1.6rem;
  margin-bottom: 6px;
}
.card-sub {
  font-size: 0.85rem;
  color: var(--muted);
  margin-bottom: 28px;
  line-height: 1.5;
}

.field { margin-bottom: 16px; }
label {
  display: block;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}
input {
  font-family: var(--sans);
  font-size: 1rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--text);
  padding: 12px 14px;
  width: 100%;
  outline: none;
  transition: border-color 0.15s;
  letter-spacing: 0.02em;
}
input:focus { border-color: var(--accent); }
input::placeholder { color: var(--muted); letter-spacing: 0; }
input[type="password"] { letter-spacing: 0.2em; font-size: 1.1rem; }

.btn-login {
  font-family: var(--sans);
  font-size: 0.95rem;
  font-weight: 600;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 14px;
  width: 100%;
  cursor: pointer;
  margin-top: 8px;
  transition: background 0.15s;
  letter-spacing: 0.01em;
}
.btn-login:hover { background: var(--accent-dim); }
.btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

.error-msg {
  font-size: 0.82rem;
  color: var(--accent);
  background: rgba(200,16,46,0.05);
  border: 1px solid rgba(200,16,46,0.15);
  border-radius: 6px;
  padding: 10px 12px;
  margin-top: 14px;
  display: none;
}
.error-msg.visible { display: block; }

.footer-note {
  font-size: 0.75rem;
  color: var(--muted);
  text-align: center;
}
</style>
</head>
<body>

<div class="login-wrap">
  <div class="logo">
    The<span class="bold">Daniel</span>Lab
    <span class="sub">Seoul · Boston</span>
  </div>

  <div class="card">
    <h1 class="card-title">Student login</h1>
    <p class="card-sub">Enter the student code and PIN your teacher gave you.</p>

    <div class="field">
      <label for="code">Student Code</label>
      <input type="text" id="code" placeholder="DL-2025-XXXX"
             autocomplete="off" autocapitalize="characters"
             oninput="this.value = this.value.toUpperCase()"
             onkeydown="if(event.key==='Enter') document.getElementById('pin').focus()" />
    </div>

    <div class="field">
      <label for="pin">PIN</label>
      <input type="password" id="pin" placeholder="••••"
             maxlength="8"
             onkeydown="if(event.key==='Enter') attemptLogin()" />
    </div>

    <button class="btn-login" id="login-btn" onclick="attemptLogin()">Sign in</button>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <div class="footer-note">Don't know your code or PIN? Ask your teacher.</div>
</div>

<script>
/* ============================================================
   ⚙ ADMIN: Set these two values before giving this file
   to students. Copy from your Supabase project settings.
============================================================ */
function getConfig() {
  return {
    url: (typeof CONFIG !== 'undefined' && CONFIG.SUPABASE_URL) || localStorage.getItem('dl_sb_url') || '',
    key: (typeof CONFIG !== 'undefined' && CONFIG.SUPABASE_KEY) || localStorage.getItem('dl_sb_key') || '',
  };
}

async function attemptLogin() {
  const code  = document.getElementById('code').value.trim().toUpperCase();
  const pin   = document.getElementById('pin').value.trim();
  const btn   = document.getElementById('login-btn');
  const errEl = document.getElementById('error-msg');

  errEl.classList.remove('visible');

  if (!code || !pin) {
    showError('Please enter both your student code and PIN.');
    return;
  }

  const { url, key } = getConfig();
  if (!url || !key) {
    showError('Login service not configured. Contact your teacher.');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Signing in…';

  try {
    /* Fetch only the fields needed to verify — never expose all data here */
    const res = await fetch(
      `${url}/rest/v1/students?student_code=eq.${encodeURIComponent(code)}&select=id,name,grade,student_code,pin`,
      {
        headers: {
          'apikey': key,
          'Authorization': `Bearer ${key}`,
        }
      }
    );

    if (!res.ok) throw new Error('Network error. Try again.');

    const data = await res.json();

    if (!data || data.length === 0) {
      showError('Student code not found. Check with your teacher.');
      return;
    }

    const student = data[0];

    if (!student.pin) {
      showError('No PIN set for this account yet. Ask your teacher.');
      return;
    }

    if (student.pin !== pin) {
      showError('Incorrect PIN. Try again.');
      return;
    }

    /* ✓ Auth passed — store session and redirect */
    sessionStorage.setItem('dl_student_id',   student.id);
    sessionStorage.setItem('dl_student_name', student.name);
    sessionStorage.setItem('dl_student_code', student.student_code);
    sessionStorage.setItem('dl_student_grade',student.grade);

    window.location.href = 'daniellab_student.html';

  } catch (e) {
    showError(e.message || 'Login failed. Try again.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign in';
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('visible');
}
</script>
<footer style="text-align:center;padding:32px 24px 16px;font-size:0.72rem;color:#aaa;letter-spacing:0.04em;">Developed by Kevin Choi </body>nbsp;·</body>nbsp; Powered by Vector AI</footer>
</body>
</html>
