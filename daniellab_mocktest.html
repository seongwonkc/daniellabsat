<style>
.bb-question-layout {
  display:grid; grid-template-columns:1fr 1px 1fr;
  height:calc(100vh - 55px); overflow:hidden;
}
.bb-left-panel  { padding:var(--panel-padding,28px 32px); overflow-y:auto; }
.bb-divider-line { background:var(--border-light); width:1px; }
.bb-right-panel  { padding:var(--panel-padding,28px 32px); overflow-y:auto; display:flex; flex-direction:column; }
.bb-panel-tag { font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);margin-bottom:14px; }
.bb-q-num { font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:16px;display:flex;align-items:center;gap:10px; }

.bb-intro-divider  { width:1px;height:48px;background:var(--border); }
.bb-intro-desc { font-size:14px;color:var(--text-muted);line-height:1.65;margin-bottom:28px; }
@media (max-width:768px) {
  .bb-question-layout { grid-template-columns:1fr;grid-template-rows:auto 1px auto;height:auto;overflow:visible; }
  .bb-divider-line { height:1px;width:auto; }
}
/* Test selector */
.test-select-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-bottom:32px; }
.test-card {
  background:var(--bg-surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);
  padding:24px;cursor:pointer;transition:all .12s;text-align:left;
}
.test-card:hover { border-color:var(--blue-border);background:var(--blue-light); }
.test-card .tc-tag  { font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px; }
.test-card .tc-name { font-size:17px;font-weight:700;color:var(--text);margin-bottom:4px; }
.test-card .tc-sub  { font-size:13px;color:var(--text-muted);margin-bottom:14px;line-height:1.4; }
.test-card .tc-meta { font-size:12px;color:var(--text-dim); }
/* Results */
.mt-results { max-width:680px;margin:0 auto;padding:48px 24px 80px; }
.mt-score-row { display:flex;align-items:baseline;gap:16px;margin-bottom:32px;flex-wrap:wrap; }
.mt-score-big { font-size:72px;font-weight:700;color:var(--blue);line-height:1; }
.mt-breakdown { display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px; }
.mt-breakdown-card { background:var(--bg-surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:20px 24px; }
.mt-breakdown-card .label { font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px; }
.mt-breakdown-card .val   { font-size:36px;font-weight:700;color:var(--text);line-height:1; }
.mt-breakdown-card .sub   { font-size:12px;color:var(--text-muted);margin-top:4px; }
.mt-domain-row { display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border-light);font-size:13px; }
.mt-domain-row:last-child { border-bottom:none; }
.mt-domain-score { font-weight:600;color:var(--blue); }
/* Flag */
.flag-btn { background:none;border:none;cursor:pointer;font-size:16px;opacity:0.35;transition:opacity .15s,color .15s;padding:0 4px;line-height:1; }
.flag-btn:hover  { opacity:0.7; }
.flag-btn.active { opacity:1; color:#E53935; }
.bb-dot.flagged::after { content:'';position:absolute;top:-2px;right:-2px;width:6px;height:6px;border-radius:50%;background:#E53935;border:1px solid #fff; }

/* Highlighter marks */
mark.hl-yellow { background:#FFF176; color:inherit; border-radius:2px; }
mark.hl-green  { background:#B9F6CA; color:inherit; border-radius:2px; }

  <button class="hl-btn" style="background:#B9F6CA;" id="hl-green"  title="Green highlighter"></button>

<script>
'use strict';

/* ── Auth ──────────────────────────────────────────────── */
const studentId   = sessionStorage.getItem('dl_student_id');
const studentName = sessionStorage.getItem('dl_student_name');
if (!studentId) window.location.href = 'daniellab_login.html';

document.getElementById('btn-exit').addEventListener('click', () => {
  if (confirm('Exit the mock test? Progress will not be saved.'))
    window.location.href = 'daniellab_student.html';
});

/* ── Supabase ──────────────────────────────────────────── */
function getConfig() {
  return {
    url: (typeof CONFIG !== 'undefined' && CONFIG.SUPABASE_URL) || localStorage.getItem('dl_sb_url') || '',
    key: (typeof CONFIG !== 'undefined' && CONFIG.SUPABASE_KEY) || localStorage.getItem('dl_sb_key') || '',
  };
}
async function sbPost(path, body) {
  const { url, key } = getConfig();
  if (!url || !key) return;
  await fetch(`${url}/rest/v1/${path}`, {
    method: 'POST',
    headers: { 'Content-Type':'application/json','apikey':key,'Authorization':`Bearer ${key}`,'Prefer':'return=minimal' },
    body: JSON.stringify(body),
  });
}

/* ── KaTeX ─────────────────────────────────────────────── */
window.katexLoaded = false;
document.addEventListener('katexReady', () => { window.katexLoaded = true; renderKatex(); });
function renderKatex() {
  if (!window.katexLoaded || typeof renderMathInElement !== 'function') return;
  renderMathInElement(document.getElementById('app'), {
    delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],
    throwOnError:false,
  });
}

/* ── Available tests registry ──────────────────────────── */
// Add new tests here. Everything else adapts automatically.
const AVAILABLE_TESTS = [
  {
    id:        'practice',
    tag:       'Practice Mode',
    name:      'Random Practice Test',
    sub:       'Questions drawn from your full question bank',
    meta:      '~58 questions · Adaptive',
    rw1q:20, rw2q:20, mathq:18,
    rw1min:25, rw2min:25, mathmin:22,
    threshold: 14,   // score needed out of rw1q to get hard module 2
  },
  {
    id:        'mt01',
    tag:       'Official Test',
    name:      'December 2024',
    sub:       'US Form A · Full length',
    meta:      '98 questions · Official timing',
    rw1q:27, rw2q:27, mathq:22,
    rw1min:32, rw2min:32, mathmin:35,
    threshold: 19,   // 70% of 27
  },
];

/* ── State ─────────────────────────────────────────────── */
const S = {
  view:'intro', modulePhase:'intro', qIndex:0,
  selectedTest: null,
  rw1Responses:{}, rw1Score:null,
  moduleType:null,
  rw2Responses:{}, rw2Score:null,
  mathResponses:{}, mathScore:null, mathTimeAtEnd:null,
  timerRemaining:0, timerInterval:null,
  sessionId: crypto.randomUUID(),
  responseTimes:{},
  flags:{},
};

/* ── Timer ─────────────────────────────────────────────── */
let questionStartTime = null;
function recordQuestionStart() { questionStartTime = Date.now(); }
function recordQuestionEnd(qId) {
  if (!questionStartTime) return;
  S.responseTimes[qId] = Math.round((Date.now() - questionStartTime) / 1000);
  questionStartTime = null;
}
function startTimer(seconds) {
  stopTimer();
  S.timerRemaining = seconds;
  document.getElementById('nav-timer').classList.add('active');
  updateTimerDisplay();
  S.timerInterval = setInterval(() => {
    S.timerRemaining = Math.max(0, S.timerRemaining - 1);
    updateTimerDisplay();
    if (S.timerRemaining === 0) { stopTimer(); autoSubmit(); }
  }, 1000);
}
function stopTimer() {
  if (S.timerInterval) { clearInterval(S.timerInterval); S.timerInterval = null; }
  const el = document.getElementById('nav-timer');
  if (el) el.classList.remove('active','warn','critical');
}
function fmt(s) { return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }
function updateTimerDisplay() {
  const nav = document.getElementById('nav-timer');
  if (!nav) return;
  nav.textContent = fmt(S.timerRemaining);
  nav.classList.toggle('warn',     S.timerRemaining<=300 && S.timerRemaining>60);
  nav.classList.toggle('critical', S.timerRemaining<=60);
}
function autoSubmit() {
  if      (S.view==='rw1')  submitModule('rw1');
  else if (S.view==='rw2')  submitModule('rw2');
  else if (S.view==='math') { S.mathTimeAtEnd=0; submitModule('math'); }
}

/* ── Question helpers ──────────────────────────────────── */
function getQuestions() {
  const t = S.selectedTest;
  if (!t) return [];
  if (S.view==='rw1') {
    return t.id==='practice' ? RW1_QUESTIONS : MT01_RW1;
  }
  if (S.view==='rw2') {
    if (t.id==='practice') return S.moduleType==='hard' ? RW2_HARD_QUESTIONS : RW2_EASY_QUESTIONS;
    return MT01_RW2_HARD; // MT01 hard only for now
  }
  if (S.view==='math') {
    return t.id==='practice' ? MATH_QUESTIONS : MT01_MATH1;
  }
  return [];
}
function getResponses() {
  if (S.view==='rw1')  return S.rw1Responses;
  if (S.view==='rw2')  return S.rw2Responses;
  if (S.view==='math') return S.mathResponses;
  return {};
}
function setR(id, val) {
  if      (S.view==='rw1')  S.rw1Responses[id]=val;
  else if (S.view==='rw2')  S.rw2Responses[id]=val;
  else if (S.view==='math') S.mathResponses[id]=val;
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ── Inline scoring ────────────────────────────────────── */
function scoreModule(responses, questions) {
  let correct = 0;
  questions.forEach(q => {
    const r = responses[q.id];
    if (!r) return;
    if (q.isSPR) {
      const c=(r||'').toString().trim().toLowerCase().replace(/\s/g,'');
      const e=(q.sprAnswer||'').toString().toLowerCase().replace(/\s/g,'');
      let ok=false;
      if (q.sprAnswerNum!=null){const p=parseFloat(c);if(!isNaN(p)&&Math.abs(p-q.sprAnswerNum)<0.01) ok=true;}
      if (!ok) ok=[e,e.replace('π','pi'),e.replace('π','p')].includes(c);
      if (ok) correct++;
    } else {
      if (r===q.answer) correct++;
    }
  });
  return correct;
}

function domainBreakdown(responses, questions) {
  const stats = {};
  questions.forEach(q => {
    if (!q.domain) return;
    if (!stats[q.domain]) stats[q.domain] = { correct:0, total:0 };
    stats[q.domain].total++;
    const r = responses[q.id];
    if (!r) return;
    let ok = false;
    if (q.isSPR) {
      const c=(r||'').toString().trim().toLowerCase().replace(/\s/g,'');
      const e=(q.sprAnswer||'').toString().toLowerCase().replace(/\s/g,'');
      if (q.sprAnswerNum!=null){const p=parseFloat(c);if(!isNaN(p)&&Math.abs(p-q.sprAnswerNum)<0.01) ok=true;}
      if (!ok) ok=[e,e.replace('π','pi'),e.replace('π','p')].includes(c);
    } else { ok = r===q.answer; }
    if (ok) stats[q.domain].correct++;
  });
  return stats;
}

/* ── Render ────────────────────────────────────────────── */
function render() {
  updateNav();
  const app = document.getElementById('app');
  if      (S.view==='intro')          app.innerHTML = htmlWelcome();
  else if (S.view==='test_select')    app.innerHTML = htmlTestSelect();
  else if (S.modulePhase==='intro')   app.innerHTML = htmlModuleIntro();
  else if (S.view==='done')           app.innerHTML = htmlResults();
  else                              { app.innerHTML = htmlQuestion(); recordQuestionStart(); }
  bindEvents();
  renderKatex();
  window.scrollTo(0,0);
}

function updateNav() {
  const bar = document.getElementById('progress-bar');
  const lbl = document.getElementById('nav-label');
  if (!bar||!lbl) return;
  if (['intro','test_select','done'].includes(S.view)) {
    bar.style.width = S.view==='done' ? '100%' : '0%';
    lbl.innerHTML = ''; return;
  }
  const qs = getQuestions();
  if (S.modulePhase==='active'&&qs.length) {
    bar.style.width = ((S.qIndex/qs.length)*100)+'%';
    const names = {
      rw1:'Reading & Writing · Module 1',
      rw2:`Reading & Writing · Module 2 (${S.moduleType||'standard'})`,
      math:'Math',
    };
    lbl.innerHTML = `<strong>${names[S.view]}</strong> &nbsp;·&nbsp; Q ${S.qIndex+1} / ${qs.length}`;
    const ht=document.getElementById('hl-toolbar'); if(ht) ht.style.opacity='1';
  } else { bar.style.width='5%'; lbl.innerHTML=''; }
}

/* ── Screens ───────────────────────────────────────────── */
function htmlWelcome() {
  return `
<div class="bb-screen">
  <div class="bb-intro-card" style="max-width:560px;">
    <div class="bb-intro-tag">DanielLab · Mock Test</div>
    <div class="bb-title" style="margin-bottom:8px;">Digital SAT</div>
    <div style="font-size:14px;color:var(--text-muted);line-height:1.6;margin-bottom:28px;">
      This test follows the adaptive Digital SAT format.<br>
      Plan for approximately <strong>2 hours</strong> for a full test. Do not close the browser during the test.
    </div>
    <div style="font-size:13px;color:var(--text-muted);margin-bottom:28px;line-height:1.55;text-align:left;background:var(--bg-surface);border-radius:var(--radius);padding:14px 16px;">
      <strong>How it adapts:</strong> Your Module 1 score determines which Module 2 you receive — standard or advanced.
    </div>
    <button class="bb-btn bb-btn-primary bb-btn-lg bb-btn-full" id="btn-choose-test">Choose a test →</button>
  </div>
</div>`;
}

function htmlTestSelect() {
  const cards = AVAILABLE_TESTS.map(t => `
    <div class="test-card" data-testid="${t.id}">
      <div class="tc-tag">${t.tag}</div>
      <div class="tc-name">${t.name}</div>
      <div class="tc-sub">${t.sub}</div>
      <div class="tc-meta">${t.meta}</div>
    </div>`).join('');

  return `
<div class="bb-screen">
  <div style="max-width:700px;margin:0 auto;padding:40px 24px 80px;">
    <div style="font-size:22px;font-weight:700;color:var(--text);margin-bottom:6px;">Select a test</div>
    <div style="font-size:14px;color:var(--text-muted);margin-bottom:28px;">Choose a full-length test or draw randomly from your question bank.</div>
    <div class="test-select-grid">${cards}</div>
    <button class="bb-btn bb-btn-ghost" id="btn-back-to-intro">← Back</button>
  </div>
</div>`;
}

function htmlModuleIntro() {
  const t = S.selectedTest;
  const key = S.view==='rw2' ? (S.moduleType==='hard'?'rw2h':'rw2e') : S.view;
  const cfgs = {
    rw1:  { sub:'Module 1 of 2',            title:'Reading & Writing', q:t.rw1q,  min:t.rw1min,  desc:'Read each passage and answer the question. You may navigate back within this module.' },
    rw2e: { sub:'Module 2 of 2 — Standard', title:'Reading & Writing', q:t.rw2q,  min:t.rw2min,  desc:'Continue with the same format. You may not return to Module 1.' },
    rw2h: { sub:'Module 2 of 2 — Advanced', title:'Reading & Writing', q:t.rw2q,  min:t.rw2min,  desc:'Continue with the same format. You may not return to Module 1.' },
    math: { sub:'Final Module',              title:'Math',              q:t.mathq, min:t.mathmin, desc:'Some questions require a typed answer. A calculator is available for all questions.' },
  };
  const c = cfgs[key];
  return `
<div class="bb-screen">
  <div class="bb-intro-card">
    <div class="bb-intro-tag">${c.sub}</div>
    <div class="bb-title" style="margin-bottom:0;">${c.title}</div>
    <div class="bb-intro-stats">
      <div><div class="bb-intro-stat-val">${c.q}</div><div class="bb-intro-stat-lbl">Questions</div></div>
      <div class="bb-intro-divider"></div>
      <div><div class="bb-intro-stat-val">${c.min}</div><div class="bb-intro-stat-lbl">Minutes</div></div>
    </div>
    <div class="bb-intro-desc">${c.desc}</div>
    <button class="bb-btn bb-btn-primary bb-btn-lg bb-btn-full" id="btn-begin-module">Begin module →</button>
  </div>
</div>`;
}

function htmlQuestion() {
  const questions = getQuestions();
  const responses = getResponses();
  const q = questions[S.qIndex];
  if (!q) return '';

  const isMath   = S.view==='math';
  const resp     = responses[q.id];
  const isLast   = S.qIndex===questions.length-1;
  const answered = Object.values(responses).filter(v=>v!==undefined&&v!==null&&v!=='').length;
  const allDone  = questions.every(qq=>{ const v=responses[qq.id]; return v!==undefined&&v!==null&&v!==''; });

  let answerHtml = '';
  if (q.isSPR) {
    answerHtml = `
    <div class="bb-spr-wrap">
      <input class="bb-spr-input" id="spr-input" type="text" autocomplete="off" spellcheck="false"
        placeholder="Answer" value="${resp!==undefined?esc(String(resp)):''}">
      <div class="bb-spr-hint">Enter a number or expression (e.g. 26π or 26pi)</div>
    </div>`;
  } else if (q.choices) {
    const letters = ['A','B','C','D'].filter(l=>q.choices[l]);
    answerHtml = `<div class="bb-choices">
      ${letters.map(l=>`
      <button class="bb-choice ${resp===l?'selected':''}" data-letter="${l}">
        <span class="bb-choice-circle">${l}</span>
        <span>${q.choices[l]}</span>
      </button>`).join('')}
    </div>`;
  }

  const canNext = q.isSPR
    ? (resp!==undefined&&resp!==null&&String(resp).trim()!=='')
    : !!resp;

  const navHtml = `
  <div class="bb-q-nav">
    <button class="bb-btn bb-btn-ghost" id="btn-q-prev" ${S.qIndex===0?'disabled':''}>← Back</button>
    ${isLast
      ?`<div style="text-align:right;">
          <button class="bb-btn bb-btn-primary" id="btn-q-submit">Submit module →</button>
          ${!allDone?`<div class="bb-submit-note">${answered}/${questions.length} answered</div>`:''}
        </div>`
      :`<button class="bb-btn bb-btn-primary" id="btn-q-next" ${!canNext?'disabled':''}>Next →</button>`
    }
  </div>`;

  const dots = questions.map((qq,i)=>{
    const a=responses[qq.id];
    const isFlagged=S.flags[qq.id]?'flagged':'';
    const cls=i===S.qIndex?'current':(a!==undefined&&a!==null&&a!=='')?'answered':'';
    return `<div class="bb-dot ${cls} ${isFlagged}" data-qi="${i}">${i+1}</div>`;
  }).join('');
  const flaggedIndices = questions.map((qq,i)=>S.flags[qq.id]?i:-1).filter(i=>i>=0);
  const flagBtn = `<button class="flag-btn ${S.flags[q.id]?'active':''}" id="btn-flag" title="Flag for review">⚑</button>`;
  const jumpBtn = flaggedIndices.length>0
    ? `<button class="bb-btn bb-btn-ghost" id="btn-jump-flagged" style="font-size:11px;padding:4px 10px;">⚑ ${flaggedIndices.length} flagged</button>`
    : '';
  const dotsStrip = `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
    <div class="bb-dots-strip" style="margin-bottom:0;">${dots}</div>
    <div style="display:flex;align-items:center;gap:8px;">${jumpBtn}${flagBtn}</div>
  </div>`;

  let passageHtml='';
  if (q.dualText) {
    const t1 = typeof q.dualText==='object' ? q.dualText.text1 : q.passage;
    const t2 = typeof q.dualText==='object' ? q.dualText.text2 : q.dualText;
    passageHtml=`<div class="bb-panel-tag">Texts</div>
    <div class="bb-dual-wrap">
      <div class="bb-text-block"><div class="bb-text-label">Text 1</div><div class="bb-passage">${t1}</div></div>
      <div class="bb-text-block"><div class="bb-text-label">Text 2</div><div class="bb-passage">${t2}</div></div>
    </div>`;
  } else if (q.notes) {
    passageHtml=`<div class="bb-panel-tag">Notes</div>
    <div class="bb-notes-box">
      <ul>${q.notes.map(n=>`<li>${n}</li>`).join('')}</ul>
      ${q.noteTask?`<div class="bb-notes-task">${q.noteTask}</div>`:''}
    </div>`;
  } else if (q.passage) {
    let txt=q.passage;
    if (q.underline) txt+=` <u>${q.underline}</u>`;
    passageHtml=`<div class="bb-panel-tag">Passage</div><div class="bb-passage">${txt}</div>
    ${q.table?(q.table.trim().startsWith('<')?q.table.replace(/class="data-table"/g,'class="bb-data-table"'):parseTextTable(q.table)):''}`;
  } else if (q.table) {
    passageHtml=`<div class="bb-panel-tag">Data</div>${parseTextTable(q.table)}`;
  }

  if (q.graph && !passageHtml) {
    passageHtml = `<div class="bb-panel-tag">Figure</div><div style="padding:8px 0;">${q.graph}</div>`;
  }

  if (q.katex && !passageHtml) {
    passageHtml=`<div class="bb-panel-tag">Figure / Data</div><div class="bb-passage katex-content" style="font-size:14px;line-height:1.8;">${q.katex}</div>`;
  }

  const typeLabel = (q.type||'').replace(/_/g,' ');
  const stem = q.question||q.text||'';
  const calcBtn = isMath
    ? `<button class="bb-btn bb-btn-ghost" onclick="toggleCalc()" style="font-size:12px;padding:6px 12px;margin-left:auto;">🖩 Calculator</button>`
    : '';

  if (isMath||!passageHtml) {
    return `
<div class="bb-math-layout">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">${dotsStrip}${calcBtn}</div>
  <div class="bb-math-stem">
    <div style="font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px;">Q${q.num} · ${typeLabel}</div>
    ${passageHtml?`<div style="margin-bottom:16px;">${passageHtml}</div>`:''}
    <div class="${q.katex?'katex-content':''}" style="font-size:15px;line-height:1.75;">${stem}</div>
  </div>
  <div class="${q.katex?'katex-content':''}">${answerHtml}</div>
  ${navHtml}
</div>
<div id="calc-panel" class="bb-calc-panel" style="display:none;flex-direction:column;">
  <div class="bb-calc-header">
    <span>Calculator</span>
    <button onclick="toggleCalc()" style="background:none;border:none;cursor:pointer;font-size:18px;color:#fff;line-height:1;">×</button>
  </div>
  <iframe src="https://www.desmos.com/scientific" class="bb-calc-iframe" title="Calculator"></iframe>
</div>`;
  }

  return `
<div class="bb-question-layout">
  <div class="bb-left-panel">${passageHtml}</div>
  <div class="bb-divider-line"></div>
  <div class="bb-right-panel">
    ${dotsStrip}
    <div class="bb-q-num">Q${q.num} of ${questions.length} <span class="bb-q-type-badge">${typeLabel}</span></div>
    <div class="bb-question-stem">${stem}</div>
    ${answerHtml}
    ${navHtml}
  </div>
</div>`;
}

function toggleCalc() {
  const p=document.getElementById('calc-panel');
  if (p) p.style.display = p.style.display==='none'?'flex':'none';
}

function htmlResults() {
  const t = S.selectedTest;
  const rw1Qs  = t.id==='mt01' ? MT01_RW1 : RW1_QUESTIONS;
  const rwQs   = S.moduleType==='hard'
    ? (t.id==='mt01' ? MT01_RW2_HARD : RW2_HARD_QUESTIONS)
    : (t.id==='mt01' ? MT01_RW2_HARD : RW2_EASY_QUESTIONS);
  const mathQs = t.id==='mt01' ? MT01_MATH1 : MATH_QUESTIONS;

  const rwTotal   = t.rw1q + t.rw2q;
  const mathTotal = t.mathq;
  const rwRaw     = (S.rw1Score||0)+(S.rw2Score||0);
  const rwScaled  = Math.round(200+(rwRaw/rwTotal)*600);
  const mathScaled= Math.round(200+((S.mathScore||0)/mathTotal)*600);
  const total = rwScaled+mathScaled;
  const target = parseInt(sessionStorage.getItem('dl_student_target')||'0');
  const gap = target ? target - total : null;

  const allRWQs   = [...rw1Qs,...rwQs];
  const rwBreak   = domainBreakdown({...S.rw1Responses,...S.rw2Responses}, allRWQs);
  const mathBreak = domainBreakdown(S.mathResponses, mathQs);
  const allBreak  = {...rwBreak,...mathBreak};

  // Time analysis per domain
  const timeByDomain = {};
  const allQs = [...rw1Qs,...rwQs,...mathQs];
  allQs.forEach(q => {
    const t = S.responseTimes[q.id];
    if (!t||!q.domain) return;
    if (!timeByDomain[q.domain]) timeByDomain[q.domain] = {total:0,count:0};
    timeByDomain[q.domain].total += t;
    timeByDomain[q.domain].count++;
  });

  // Missed question type analysis
  const missedTypes = {};
  allQs.forEach(q => {
    const r = [...Object.entries(S.rw1Responses),...Object.entries(S.rw2Responses),...Object.entries(S.mathResponses)]
      .find(([id])=>id===q.id)?.[1];
    if (!r||!q.type) return;
    let ok = q.isSPR
      ? (()=>{const c=(r||'').toString().trim().toLowerCase().replace(/\s/g,'');const e=(q.sprAnswer||'').toString().toLowerCase().replace(/\s/g,'');let ok=false;if(q.sprAnswerNum!=null){const p=parseFloat(c);if(!isNaN(p)&&Math.abs(p-q.sprAnswerNum)<0.01)ok=true;}if(!ok)ok=[e,e.replace('π','pi'),e.replace('π','p')].includes(c);return ok;})()
      : r===q.answer;
    if (!ok) missedTypes[q.type] = (missedTypes[q.type]||0)+1;
  });
  const topMissed = Object.entries(missedTypes).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const DOMAIN_NAMES = {
    craft_structure:'Craft & Structure', info_ideas:'Information & Ideas',

    psda:'Problem Solving & Data',      geometry:'Geometry',

    cross_text:'Cross-Text Questions',        central_idea:'Central Ideas',
    command_of_evidence:'Command of Evidence',transition:'Transitions',
    rhetorical_synthesis:'Rhetorical Synthesis',boundaries:'Boundaries',
    form_structure_sense:'Form, Structure & Sense',
    linear_equation:'Linear Equations',      linear_inequality:'Linear Inequalities',
    systems:'Systems of Equations',          quadratic:'Quadratic Equations',
    polynomial:'Polynomials',                exponential:'Exponential Functions',

    geometry:'Geometry',                     trigonometry:'Trigonometry',
    data_interpretation:'Data Interpretation',word_problem:'Word Problems',
  };

  function fmtTime(sec) { return `${Math.floor(sec/60)}:${String(sec%60).padStart(2,'0')}`; }
  function timeBadge(sec, isMath) {
    const slow = isMath ? 150 : 90;
    const fast = isMath ? 75 : 45;
    if (sec > slow) return `<span style="font-size:.68rem;font-weight:700;padding:1px 6px;border-radius:3px;background:rgba(200,16,46,.08);color:#c8102e;">Slow</span>`;
    if (sec < fast) return `<span style="font-size:.68rem;font-weight:700;padding:1px 6px;border-radius:3px;background:rgba(42,122,79,.08);color:#2a7a4f;">Fast</span>`;
    return `<span style="font-size:.68rem;font-weight:700;padding:1px 6px;border-radius:3px;background:rgba(0,0,0,.05);color:#888;">OK</span>`;
  }

  const RW_DOMS  = ['craft_structure','info_ideas','sec','eoi'];
  const MATH_DOMS = ['algebra','advanced_math','psda','geometry'];

  function domainBar(d) {
    const s = allBreak[d];

    const pct = Math.round((s.correct/s.total)*100);

    </div>`;

  // Auto-recommendation
  const weakest = Object.entries(allBreak).filter(([,v])=>v.total>=3).sort(([,a],[,b])=>(a.correct/a.total)-(b.correct/b.total))[0];
  const slowDomain = Object.entries(timeByDomain).filter(([d])=>MATH_DOMS.includes(d)).sort(([,a],[,b])=>(b.total/b.count)-(a.total/a.count)).find(([,v])=>v.total/v.count>150);

  let rec = weakest

    : 'Solid performance across all domains.';
  if (slowDomain) rec += ` Pacing on <strong>${DOMAIN_NAMES[slowDomain[0]]||slowDomain[0]}</strong> is slow (avg ${fmtTime(Math.round(slowDomain[1].total/slowDomain[1].count))}/question) — drill timed problem sets.`;
  if (rwDrop) rec += ` RW accuracy dropped in Module 2 (${Math.round(rw1Pct*100)}% → ${Math.round(rw2Pct*100)}%) — review harder question types in weak domains.`;

  const drillLinks = [weakest?.[0], slowDomain?.[0]].filter(Boolean).filter((v,i,a)=>a.indexOf(v)===i).map(d=>
    `<a href="daniellab_practice.html" style="font-size:.78rem;font-weight:600;padding:5px 12px;border-radius:6px;background:rgba(200,16,46,.07);color:#c8102e;border:1px solid rgba(200,16,46,.15);text-decoration:none;">Drill ${DOMAIN_NAMES[d]||d} →</a>`
  ).join('');

  const domainTableRows = [...RW_DOMS,...MATH_DOMS].map(d => {
    const s = allBreak[d];
    if (!s||s.total===0) return '';
    const pct = Math.round((s.correct/s.total)*100);
    const tm = timeByDomain[d];
    const avgSec = tm ? Math.round(tm.total/tm.count) : null;
    const isMath = MATH_DOMS.includes(d);
    return `<tr>
      <td style="padding:7px 10px;font-size:.8rem;">${DOMAIN_NAMES[d]||d}</td>
      <td style="padding:7px 10px;font-size:.8rem;text-align:center;">${s.correct}/${s.total}</td>
      <td style="padding:7px 10px;font-size:.8rem;text-align:center;font-weight:600;color:${pct>=70?'#2a7a4f':pct>=50?'#b45309':'#c8102e'}">${pct}%</td>
      <td style="padding:7px 10px;font-size:.8rem;text-align:center;">${avgSec ? fmtTime(avgSec) : '—'}</td>
      <td style="padding:7px 10px;font-size:.8rem;">${avgSec ? timeBadge(avgSec,isMath) : ''}</td>
    </tr>`;
  }).join('');

  return `
<div style="max-width:700px;margin:0 auto;padding:36px 24px 80px;">

  <!-- ── SCORE HEADER ──────────────────────────────── -->
  <div style="display:flex;align-items:baseline;gap:14px;margin-bottom:8px;flex-wrap:wrap;">
    <div style="font-size:68px;font-weight:700;color:var(--blue);line-height:1;">${total}</div>
    <div>
      <div style="font-size:14px;font-weight:600;color:var(--text);">Estimated Score — ${t.name}</div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">Module 2: ${S.moduleType==='hard'?'Advanced ✓':'Standard'} · ${rwRaw}/${rwTotal} RW raw · ${S.mathScore||0}/${mathTotal} Math raw</div>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr${target?' 1fr':''};gap:10px;margin-bottom:24px;">
    <div style="background:var(--bg-surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;">
      <div style="font-size:.65rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px;">Reading & Writing</div>
      <div style="font-size:32px;font-weight:700;line-height:1;">${rwScaled}</div>
      <div style="font-size:.72rem;color:var(--text-muted);margin-top:3px;">Raw ${rwRaw}/${rwTotal} · M1: ${S.rw1Score}/${t.rw1q} · M2: ${S.rw2Score}/${t.rw2q}</div>
    </div>
    <div style="background:var(--bg-surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;">
      <div style="font-size:.65rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px;">Math</div>
      <div style="font-size:32px;font-weight:700;line-height:1;">${mathScaled}</div>
      <div style="font-size:.72rem;color:var(--text-muted);margin-top:3px;">Raw ${S.mathScore||0}/${mathTotal}</div>
    </div>
    ${target?`<div style="background:var(--bg-surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;">
      <div style="font-size:.65rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px;">Target</div>
      <div style="font-size:32px;font-weight:700;line-height:1;">${target}</div>
      <div style="font-size:.72rem;color:${gap<=0?'#2a7a4f':'#c8102e'};margin-top:3px;font-weight:600;">${gap<=0?'✓ Reached':'Gap: '+gap+' pts'}</div>
    </div>`:''}
  </div>

  <!-- ── STUDENT SECTION ───────────────────────────── -->
  <div style="font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--border);">Student Report</div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;">
    <div style="background:var(--bg-surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;">
      <div style="font-size:.65rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px;">Reading & Writing</div>
      ${RW_DOMS.map(domainBar).join('')}
    </div>
    <div style="background:var(--bg-surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;">
      <div style="font-size:.65rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px;">Math</div>

  ${topMissed.length ? `

    <div style="font-size:.65rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px;">Most Missed Question Types</div>
    ${topMissed.map(([type,count])=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border-light);font-size:.82rem;">
      <span>${TYPE_NAMES[type]||type}</span>
      <span style="font-size:.72rem;font-weight:700;padding:2px 8px;border-radius:4px;background:rgba(200,16,46,.07);color:#c8102e;">${count} missed</span>

  ${drillLinks ? `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px;">${drillLinks}</div>` : ''}

  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:36px;">

  <!-- ── TEACHER SECTION ───────────────────────────── -->
  <div style="font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--border);">Teacher Notes</div>

        <tr style="border-bottom:1.5px solid var(--border);">
          <th style="padding:6px 10px;font-size:.72rem;text-align:left;color:var(--text-dim);font-weight:600;">Domain</th>

          <th style="padding:6px 10px;font-size:.72rem;text-align:center;color:var(--text-dim);font-weight:600;">Avg Time</th>
          <th style="padding:6px 10px;font-size:.72rem;text-align:left;color:var(--text-dim);font-weight:600;">Pace</th>

    <div style="font-size:.82rem;line-height:1.7;">
      RW Module 1: <strong>${S.rw1Score}/${t.rw1q}</strong> (${Math.round((S.rw1Score/t.rw1q)*100)}%) →
      Module 2 routed to <strong>${S.moduleType==='hard'?'Advanced':'Standard'}</strong>
      ${S.moduleType==='hard'?' ✓ Above threshold':' (below '+t.threshold+'/'+t.rw1q+')'}<br>
      RW Module 2: <strong>${S.rw2Score}/${t.rw2q}</strong> (${Math.round((S.rw2Score/t.rw2q)*100)}%)
      ${rwDrop?` <span style="font-size:.72rem;font-weight:600;color:#c8102e;">▼ Drop from M1</span>`:''}<br>
      Math: <strong>${S.mathScore||0}/${mathTotal}</strong> (${Math.round(((S.mathScore||0)/mathTotal)*100)}%)
      ${S.mathTimeAtEnd!=null?` · ${fmtTime(S.mathTimeAtEnd)} remaining`:''}
    </div>
  </div>

  <div style="background:var(--bg-surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;">
    <div style="font-size:.65rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px;">Session Recommendation</div>
    <div style="font-size:.85rem;line-height:1.65;color:var(--text);">${rec}</div>
  </div>

</div>`;
}

/* ── Events ────────────────────────────────────────────── */
function bindEvents() {
  const on    = (id,ev,fn)=>{ const el=document.getElementById(id); if(el) el.addEventListener(ev,fn); };
  const onAll = (sel,ev,fn)=>document.querySelectorAll(sel).forEach(el=>el.addEventListener(ev,fn));

  if (S.view==='intro') {
    on('btn-choose-test','click',()=>{ S.view='test_select'; render(); });
  }

  if (S.view==='test_select') {
    on('btn-back-to-intro','click',()=>{ S.view='intro'; render(); });
    onAll('.test-card','click',e=>{
      const id = e.currentTarget.dataset.testid;
      S.selectedTest = AVAILABLE_TESTS.find(t=>t.id===id);
      if (!S.selectedTest) return;
      S.view='rw1'; S.modulePhase='intro'; render();
    });
  }

  if (S.modulePhase==='intro') on('btn-begin-module','click',handleBeginModule);

  if (S.modulePhase==='active') {
    const questions=getQuestions();
    const q=questions[S.qIndex];
    if (!q) return;

    if (!q.isSPR) {
      onAll('.bb-choice','click',e=>{
        recordQuestionEnd(q.id);
        setR(q.id,e.currentTarget.dataset.letter);
        render();
      });
    }

    if (q.isSPR) {
      const inp=document.getElementById('spr-input');
      if (inp) {
        inp.focus();
        inp.addEventListener('input',()=>{
          setR(q.id,inp.value);
          const hasVal=inp.value.trim().length>0;
          if (S.qIndex===questions.length-1) {
            const sub=document.getElementById('btn-q-submit');
            if (sub) sub.disabled=false;
          } else {
            const nxt=document.getElementById('btn-q-next');
            if (nxt) nxt.disabled=!hasVal;
          }
        });
      }
    }

    on('btn-flag','click',()=>{ S.flags[q.id]=!S.flags[q.id]; render(); });
    on('btn-jump-flagged','click',()=>{
      const fi=questions.map((qq,i)=>S.flags[qq.id]?i:-1).filter(i=>i>=0);
      if (!fi.length) return;
      const cur=fi.indexOf(S.qIndex);
      S.qIndex=fi[(cur+1)%fi.length]; render();
    });
    on('btn-q-prev','click',()=>{ if(S.qIndex>0){S.qIndex--;render();} });
    on('btn-q-next','click',()=>{
      if (q.isSPR){ const inp=document.getElementById('spr-input'); if(!inp||!inp.value.trim()) return; recordQuestionEnd(q.id); setR(q.id,inp.value.trim()); }
      else if (!getResponses()[q.id]) return;
      S.qIndex++; render();
    });
    on('btn-q-submit','click',()=>{
      if (q.isSPR){ const inp=document.getElementById('spr-input'); if(inp){ recordQuestionEnd(q.id); setR(q.id,inp.value.trim()); } }
      else { recordQuestionEnd(q.id); }
      const qs=getQuestions(), rs=getResponses();
      const unanswered=qs.filter(qq=>!rs[qq.id]).length;
      if (unanswered>0&&!confirm(`${unanswered} unanswered question${unanswered>1?'s':''}. Submit anyway?`)) return;
      if (S.view==='math') S.mathTimeAtEnd=S.timerRemaining;
      submitModule(S.view);
    });
    onAll('.bb-dot[data-qi]','click',e=>{ S.qIndex=parseInt(e.currentTarget.dataset.qi,10); render(); });
    initHighlighter();
  }
}

/* ── Handlers ──────────────────────────────────────────── */
function handleBeginModule() {
  const t = S.selectedTest;
  const seconds = { rw1:t.rw1min*60, rw2:t.rw2min*60, math:t.mathmin*60 }[S.view] || 1500;
  S.modulePhase='active'; S.qIndex=0;
  startTimer(seconds);
  render();
}

function submitModule(module) {
  stopTimer();
  if (module==='rw1') {
    S.rw1Score  = scoreModule(S.rw1Responses, getQuestions());
    S.moduleType= S.rw1Score >= S.selectedTest.threshold ? 'hard' : 'easy';
    S.view='rw2'; S.modulePhase='intro'; S.qIndex=0; render();
  } else if (module==='rw2') {
    S.rw2Score = scoreModule(S.rw2Responses, getQuestions());
    S.view='math'; S.modulePhase='intro'; S.qIndex=0; render();
  } else if (module==='math') {
    S.mathScore = scoreModule(S.mathResponses, getQuestions());
    finishTest();
  }
}

async function finishTest() {
  S.view='done'; S.modulePhase='done'; render();

  const t = S.selectedTest;
  const rwTotal    = t.rw1q + t.rw2q;
  const rwRaw      = (S.rw1Score||0)+(S.rw2Score||0);
  const rwScaled   = Math.round(200+(rwRaw/rwTotal)*600);
  const mathScaled = Math.round(200+((S.mathScore||0)/t.mathq)*600);

  const {url,key}=getConfig();
  if (!url||!key) return;

  await sbPost('mock_tests',{
    student_id:          studentId,
    rw_score:            rwScaled,
    math_score:          mathScaled,
    total_score:         rwScaled+mathScaled,
    module_type:         S.moduleType,
    rw1_responses:       S.rw1Responses,
    rw2_responses:       S.rw2Responses,
    math_responses:      S.mathResponses,
    time_remaining_math: S.mathTimeAtEnd,
  });

  const rw1Qs  = t.id==='mt01' ? MT01_RW1 : RW1_QUESTIONS;
  const rwQs   = S.moduleType==='hard'
    ? (t.id==='mt01' ? MT01_RW2_HARD : RW2_HARD_QUESTIONS)
    : (t.id==='mt01' ? MT01_RW2_HARD : RW2_EASY_QUESTIONS);
  const mathQs = t.id==='mt01' ? MT01_MATH1 : MATH_QUESTIONS;

  const rows = [];
  [{questions:rw1Qs,responses:S.rw1Responses},{questions:rwQs,responses:S.rw2Responses},{questions:mathQs,responses:S.mathResponses}]
    .forEach(({questions,responses})=>{
      questions.forEach(q=>{
        const r=responses[q.id];
        let isCorrect=null;
        if (r) {
          if (q.isSPR) {
            const c=(r||'').toString().trim().toLowerCase().replace(/\s/g,'');
            const e=(q.sprAnswer||'').toString().toLowerCase().replace(/\s/g,'');
            isCorrect=false;
            if (q.sprAnswerNum!=null){const p=parseFloat(c);if(!isNaN(p)&&Math.abs(p-q.sprAnswerNum)<0.01) isCorrect=true;}
            if (!isCorrect) isCorrect=[e,e.replace('π','pi'),e.replace('π','p')].includes(c);
          } else { isCorrect=r===q.answer; }
        }
        rows.push({
          student_id:       studentId,
          session_id:       S.sessionId,
          session_type:     'mock',
          question_id:      q.id,
          domain:           q.domain,
          question_type:    q.type,
          student_answer:   r||null,
          correct_answer:   q.isSPR ? q.sprAnswer : q.answer,
          is_correct:       isCorrect,
          time_on_question: S.responseTimes[q.id]||null,
        });
      });
    });

  await fetch(`${url}/rest/v1/responses`,{
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':key,'Authorization':`Bearer ${key}`,'Prefer':'return=minimal'},
    body: JSON.stringify(rows),
  });
}

/* ── Table parser ──────────────────────────────────────── */
function parseTextTable(text) {
  if (!text) return '';
  const lines = text.trim().split('\n').filter(l => l.trim() && !l.match(/^[-|:\s]+$/));
  if (lines.length < 2) return `<p style="font-size:14px;color:var(--text-muted)">${text}</p>`;
  const rows = lines.map(l => l.split('|').map(c => c.trim()).filter(c => c !== ''));
  const [header, ...body] = rows;
  return `<table class="bb-data-table">
    <thead><tr>${header.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
    <tbody>${body.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody>
  </table>`;
}

/* ── Highlighter ───────────────────────────────────────── */
function initHighlighter() {
  let activeColor = null;
  function setActive(color) {
    activeColor = activeColor===color ? null : color;
    const yBtn=document.getElementById('hl-yellow');
    const gBtn=document.getElementById('hl-green');
    if (yBtn) yBtn.style.outline = activeColor==='yellow' ? '2px solid #fff' : 'none';
    if (gBtn) gBtn.style.outline = activeColor==='green'  ? '2px solid #fff' : 'none';
    document.body.style.cursor = activeColor ? 'text' : '';
  }
  document.getElementById('hl-yellow')?.addEventListener('click',()=>setActive('yellow'));
  document.getElementById('hl-green')?.addEventListener('click', ()=>setActive('green'));
  document.getElementById('hl-clear')?.addEventListener('click', ()=>{
    const inPassage=document.querySelector('.bb-passage,.bb-notes-box');
    if (inPassage) {
      inPassage.querySelectorAll('mark.hl-yellow,mark.hl-green').forEach(mark=>{
        const parent=mark.parentNode;
        while (mark.firstChild) parent.insertBefore(mark.firstChild,mark);
        parent.removeChild(mark); parent.normalize();
      });
    }
    window.getSelection().removeAllRanges();
    setActive(null);
  });
  document.addEventListener('mouseup',e=>{
    if (e.target.closest('#hl-toolbar')) return;
    if (!activeColor) return;
    const sel=window.getSelection();
    if (!sel||sel.isCollapsed) return;
    const range=sel.getRangeAt(0);
    const container=range.commonAncestorContainer;
    const inPassage=container.nodeType===3
      ? container.parentElement?.closest('.bb-passage,.bb-notes-box')
      : container.closest?.('.bb-passage,.bb-notes-box');
    if (!inPassage){sel.removeAllRanges();return;}
    inPassage.querySelectorAll('mark.hl-yellow,mark.hl-green').forEach(mark=>{
      if (range.intersectsNode(mark)){
        const parent=mark.parentNode;
        while (mark.firstChild) parent.insertBefore(mark.firstChild,mark);
        parent.removeChild(mark); parent.normalize();
      }
    });
    sel.removeAllRanges();
    const newRange=range.cloneRange();
    if (newRange.collapsed) return;
    const mark=document.createElement('mark');
    mark.className=activeColor==='yellow'?'hl-yellow':'hl-green';
    try { newRange.surroundContents(mark); }
    catch { const frag=newRange.extractContents(); mark.appendChild(frag); newRange.insertNode(mark); }
    sel.removeAllRanges();
  });
}

render();
