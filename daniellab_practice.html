<!DOCTYPE html>

  onload="document.dispatchEvent(new Event('katexReady'))"></script>

<style>
.bb-question-layout {
  display:grid; grid-template-columns:1fr 1px 1fr;
  height:calc(100vh - 55px); overflow:hidden;
}
.bb-left-panel  { padding:var(--panel-padding,28px 32px); overflow-y:auto; }
.bb-divider-line { background:var(--border-light); width:1px; }
.bb-right-panel  { padding:var(--panel-padding,28px 32px); overflow-y:auto; display:flex; flex-direction:column; }
.bb-panel-tag { font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);margin-bottom:14px; }
.bb-q-num { font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:16px;display:flex;align-items:center;gap:10px; }
.bb-intro-stat-val { font-size:42px;font-weight:700;color:var(--text);line-height:1; }
.bb-intro-stat-lbl { font-size:12px;color:var(--text-muted);letter-spacing:.04em;margin-top:4px; }
.bb-intro-divider  { width:1px;height:48px;background:var(--border); }
.bb-intro-desc { font-size:14px;color:var(--text-muted);line-height:1.65;margin-bottom:28px; }
.bb-choice.wrong { border-color:var(--danger);background:var(--danger-light); }
.bb-choice.wrong .bb-choice-circle { background:var(--danger);border-color:var(--danger);color:#fff; }
@media (max-width:768px) {
  .bb-question-layout { grid-template-columns:1fr;grid-template-rows:auto 1px auto;height:auto;overflow:visible; }
  .bb-divider-line { height:1px;width:auto; }
}

/* Picker */
.dl-picker { max-width:760px;margin:0 auto;padding:40px 24px 80px; }
.dl-picker-title { font-size:24px;font-weight:600;color:var(--text);margin-bottom:6px; }
.dl-picker-sub  { font-size:14px;color:var(--text-muted);margin-bottom:36px; }
.dl-section-label { font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:12px;margin-top:28px; }
.dl-domain-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:8px; }
.dl-domain-card { border:1.5px solid var(--border);border-radius:var(--radius-lg);background:var(--bg);padding:16px 18px;cursor:pointer;transition:all .12s;text-align:left; }
.dl-domain-card:hover { border-color:var(--blue-border);background:var(--blue-light); }
.dl-domain-card .dc-name  { font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px; }
.dl-domain-card .dc-count { font-size:12px;color:var(--text-dim); }
.dl-domain-card .dc-rating { font-size:11px;font-weight:600;padding:2px 6px;border-radius:3px;float:right;margin-top:-2px; }
.dc-rating.low  { background:#FFE8E8;color:var(--danger); }
.dc-rating.mid  { background:#FFF3CD;color:#856404; }
.dc-rating.high { background:#E8F7EE;color:var(--success); }

/* Highlighter */
.hl-toolbar {
  display:none; position:fixed; z-index:200;
  background:#1e1e1e; border-radius:6px; padding:4px 6px;
  gap:4px; align-items:center; box-shadow:0 4px 16px rgba(0,0,0,0.25);
}
.hl-toolbar.visible { display:flex; }
.hl-btn { width:22px;height:22px;border-radius:4px;border:1.5px solid rgba(255,255,255,0.2);cursor:pointer;transition:transform .1s; }
.hl-btn:hover { transform:scale(1.15); }
.hl-btn-clear { font-size:11px;font-weight:600;color:rgba(255,255,255,0.7);background:none;border:none;cursor:pointer;padding:0 4px;font-family:var(--font); }
.hl-btn-clear:hover { color:#fff; }
mark.hl-yellow { background:#FFF176; color:inherit; border-radius:2px; }
mark.hl-green  { background:#B9F6CA; color:inherit; border-radius:2px; }

/* Flag */
.flag-btn { background:none;border:none;cursor:pointer;font-size:16px;opacity:0.35;transition:opacity .15s,color .15s;padding:0 4px;line-height:1; }
.flag-btn:hover  { opacity:0.7; }
.flag-btn.active { opacity:1; color:#E53935; }
.bb-dot.flagged::after { content:'';position:absolute;top:-2px;right:-2px;width:6px;height:6px;border-radius:50%;background:#E53935;border:1px solid #fff; }
.bb-dot { position:relative; }

/* Results */
.dl-results { max-width:560px;margin:0 auto;padding:60px 24px;text-align:center; }
.dl-results-score { font-size:64px;font-weight:700;color:var(--blue);line-height:1;margin-bottom:8px; }
.dl-results-label { font-size:15px;color:var(--text-muted);margin-bottom:32px; }
.dl-results-breakdown { background:var(--bg-surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:20px 24px;margin-bottom:28px;text-align:left; }
.dl-review-row { display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border-light);font-size:13px; }
.dl-review-row:last-child { border-bottom:none; }
.dl-review-q { flex:1;color:var(--text);line-height:1.5; }
.dl-review-icon { flex-shrink:0;width:20px;text-align:center;font-weight:700; }
.dl-review-icon.correct { color:var(--success); }
.dl-review-icon.wrong   { color:var(--danger); }
@media (max-width:480px) { .dl-domain-grid { grid-template-columns:1fr; } }

/* Calculator */
.bb-calc-panel { position:fixed;bottom:0;right:24px;width:340px;height:420px;background:#fff;border:1.5px solid var(--border);border-bottom:none;border-radius:10px 10px 0 0;z-index:100;flex-direction:column;box-shadow:0 -4px 24px rgba(0,0,0,0.1); }
.bb-calc-header { display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600; }
.bb-calc-iframe { flex:1;border:none;border-radius:0 0 10px 10px; }
</style>
</head>
<body>

<div id="progress-bar-wrap"><div id="progress-bar" style="width:0%"></div></div>

<nav id="top-nav">
  <div class="nav-logo">The<strong>Daniel</strong>Lab <span>Practice</span></div>
  <div id="nav-timer"></div>
  <div id="nav-label" class="nav-step"></div>
  <div id="hl-toolbar" style="display:flex;gap:6px;align-items:center;opacity:0;transition:opacity .2s;">
    <button class="hl-btn" style="background:#FFF176;" id="hl-yellow" title="Yellow highlighter"></button>
    <button class="hl-btn" style="background:#B9F6CA;" id="hl-green"  title="Green highlighter"></button>
    <button class="hl-btn-clear" id="hl-clear" title="Clear all highlights">✕</button>
  </div>
  <button id="btn-exit-save" style="font-size:11px;opacity:0.45;background:none;border:none;cursor:pointer;color:inherit;padding:0 4px;">Exit & save</button>
</nav>

<div id="app"></div>
<div id="hl-toolbar" style="display:flex;gap:6px;align-items:center;">
  <button class="hl-btn" style="background:#FFF176;" id="hl-yellow" title="Yellow highlighter"></button>
  <button class="hl-btn" style="background:#B9F6CA;" id="hl-green"  title="Green highlighter"></button>
</div>

<script>
'use strict';

/* ── Auth ──────────────────────────────────────────────── */
const studentId   = sessionStorage.getItem('dl_student_id');
const studentName = sessionStorage.getItem('dl_student_name');
if (!studentId) window.location.href = 'daniellab_login.html';
function goBack() { window.location.href = 'daniellab_student.html'; }

/* ── Supabase ──────────────────────────────────────────── */
function getConfig() {
  return {
    url:(typeof CONFIG!=='undefined'&&CONFIG.SUPABASE_URL)||localStorage.getItem('dl_sb_url')||'',
    key:(typeof CONFIG!=='undefined'&&CONFIG.SUPABASE_KEY)||localStorage.getItem('dl_sb_key')||'',
  };
}
async function sbPost(path,body) {
  const {url,key}=getConfig(); if(!url||!key) return;
  await fetch(`${url}/rest/v1/${path}`,{
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':key,'Authorization':`Bearer ${key}`,'Prefer':'return=minimal'},
    body:JSON.stringify(body),
  });
}

/* ── KaTeX ─────────────────────────────────────────────── */
window.katexLoaded=false;
document.addEventListener('katexReady',()=>{ window.katexLoaded=true; renderKatex(); });
function renderKatex() {
  if(!window.katexLoaded||typeof renderMathInElement!=='function') return;
  renderMathInElement(document.getElementById('app'),{
    delimiters:[
      {left:'$$',right:'$$',display:true},
      {left:'$',right:'$',display:false},
      {left:'\\(',right:'\\)',display:false},
      {left:'\\[',right:'\\]',display:true},
    ],
    throwOnError:false,
  });
}

/* ── Domain bank — built from data.js at runtime ──────── */
// Domain metadata: Vector taxonomy
const DOMAIN_META = {
  craft_structure: { name:'Craft & Structure',           section:'Reading & Writing' },
  info_ideas:      { name:'Information & Ideas',          section:'Reading & Writing' },
  sec:             { name:'Standard English Conventions', section:'Reading & Writing' },
  eoi:             { name:'Expression of Ideas',          section:'Reading & Writing' },
  algebra:         { name:'Algebra',                      section:'Math' },
  advanced_math:   { name:'Advanced Math',                section:'Math' },
  psda:            { name:'Problem Solving & Data',       section:'Math' },
  geometry:        { name:'Geometry',                     section:'Math' },
};

// Group all questions by domain from the real arrays
function buildQuestionBank() {
  const bank = {};
  const allRW = [...RW_ALL];
  const allMath = typeof MATH_QUESTIONS !== 'undefined' ? [...MATH_QUESTIONS] : [];

  allRW.forEach(q => {
    const d = q.domain;
    if (!d) return;
    if (!bank[d]) bank[d] = [];
    // Deduplicate by id
    if (!bank[d].find(x=>x.id===q.id)) bank[d].push(q);
  });
  allMath.forEach(q => {
    const d = q.domain;
    if (!d) return;
    if (!bank[d]) bank[d] = [];
    if (!bank[d].find(x=>x.id===q.id)) bank[d].push(q);
  });
  return bank;
}

/* ── State ─────────────────────────────────────────────── */
const S = {
  view:'picker',
  domain:null,
  questions:[],
  qIndex:0,
  responses:{},
  selected:{},
  flags:{},
  highlights:{},
  responseTimes:{},
  elapsedInterval: null,
  elapsedSeconds: 0,      // { questionId: seconds }
  studentRatings:{},
  sessionId: crypto.randomUUID(),
};

let questionStartTime = null;

function fmt(s) { return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }
function recordQuestionStart() {
  questionStartTime = Date.now();
  clearInterval(S.elapsedInterval);
  S.elapsedSeconds = 0;
  S.elapsedInterval = setInterval(() => {
    S.elapsedSeconds++;
    const el = document.getElementById('nav-timer');
    if (el) {
      el.textContent = fmt(S.elapsedSeconds);
      el.classList.add('active');
      el.classList.toggle('warn',     S.elapsedSeconds >= 90  && S.elapsedSeconds < 150);
      el.classList.toggle('critical', S.elapsedSeconds >= 150);
    }
  }, 1000);
}
function recordQuestionEnd(questionId) {
  clearInterval(S.elapsedInterval);
  if (!questionStartTime) return;
  S.responseTimes[questionId] = Math.round((Date.now() - questionStartTime) / 1000);
  questionStartTime = null;
}

let QUESTION_BANK = {};

/* ── Init ──────────────────────────────────────────────── */
async function init() {
  QUESTION_BANK = buildQuestionBank();

  const {url,key}=getConfig();
  if (url&&key) {
    try {
      const res=await fetch(`${url}/rest/v1/students?id=eq.${studentId}&select=math_ratings,ebrw_ratings`,{
        headers:{'apikey':key,'Authorization':`Bearer ${key}`}
      });
      const data=await res.json();
      if (data&&data[0]) S.studentRatings={...data[0].math_ratings,...data[0].ebrw_ratings};
    } catch {}
  }
  render();
}

/* ── Render ────────────────────────────────────────────── */
function render() {
  const app=document.getElementById('app');
  if (S.view==='picker')  app.innerHTML=htmlPicker();
  if (S.view==='quiz')  { app.innerHTML=htmlQuestion(); recordQuestionStart(); }
  if (S.view==='results') app.innerHTML=htmlResults();
  bindEvents();
  renderKatex();
  window.scrollTo(0,0);
  updateNav();
}

function updateNav() {
  const bar=document.getElementById('progress-bar');
  const lbl=document.getElementById('nav-label');
  if (S.view==='picker')       { bar.style.width='0%'; lbl.innerHTML=''; }
  else if (S.view==='quiz')    {
    bar.style.width=((S.qIndex/S.questions.length)*100)+'%';
    lbl.innerHTML=`<strong>${DOMAIN_META[S.domain]?.name||S.domain}</strong> &nbsp;·&nbsp; Q ${S.qIndex+1} / ${S.questions.length}`;
    const ht=document.getElementById('hl-toolbar'); if(ht) ht.style.opacity='1';
  }
  else                          { bar.style.width='100%'; lbl.innerHTML='Results'; }
}

/* ── Picker ─────────────────────────────────────────────── */
function htmlPicker() {
  const rwDomains   = ['craft_structure','info_ideas','sec','eoi'];
  const mathDomains = ['algebra','advanced_math','psda','geometry'];

  function card(id) {
    const qs=(QUESTION_BANK[id]||[]).length;
    if (qs===0) return '';
    const r=S.studentRatings[id];
    const rClass=!r?'':r<=2?'low':r<=3?'mid':'high';
    return `
    <div class="dl-domain-card" onclick="startDomain('${id}')">
      ${r?`<div class="dc-rating ${rClass}">${r}/5</div>`:''}
      <div class="dc-name">${DOMAIN_META[id]?.name||id}</div>
      <div class="dc-count">${qs} questions · 15 per session</div>
    </div>`;
  }

  return `
<div class="dl-picker">
  <div class="dl-picker-title">Practice</div>
  <div class="dl-picker-sub">Questions drawn directly from the test bank. Pick a domain to drill.</div>

  <div class="dl-section-label">Reading &amp; Writing</div>
  <div class="dl-domain-grid">${rwDomains.map(card).join('')}</div>

  <div class="dl-section-label">Math</div>
  <div class="dl-domain-grid">${mathDomains.map(card).join('')}</div>

  <div style="margin-top:40px;">
    <a href="daniellab_mocktest.html" class="bb-btn bb-btn-secondary bb-btn-lg">Take a full mock test →</a>
  </div>
</div>`;
}

/* ── Start domain ───────────────────────────────────────── */
function startDomain(domainId) {
  const qs=shuffle([...(QUESTION_BANK[domainId]||[])]);
  if (!qs.length) return;
  S.domain=domainId; S.questions=qs.slice(0,15); S.qIndex=0; S.responses={}; S.selected={}; S.view='quiz';
  render();
}

/* ── Question ───────────────────────────────────────────── */
function htmlQuestion() {
  const q=S.questions[S.qIndex];
  const tot=S.questions.length;
  if (!q) return '';

  const isMath=['algebra','advanced_math','psda','geometry'].includes(S.domain);
  const resp=S.responses[q.id];
  const sel=S.selected[q.id];
  const isAnswered=resp!==undefined;

  /* Determine correct answer — MCQ uses q.answer, SPR uses q.sprAnswer */
  const correctAnswer = q.isSPR ? q.sprAnswer : q.answer;

  let answerHtml='';
  if (q.isSPR) {
    answerHtml=`
    <div class="bb-spr-wrap">
      <input class="bb-spr-input" id="spr-input" type="text" autocomplete="off" spellcheck="false"
        placeholder="Answer" value="${resp||''}">
      <div class="bb-spr-hint">Enter a number or expression (e.g. 26π or 26pi)</div>
    </div>`;
  } else if (q.choices) {
    const letters=['A','B','C','D'].filter(l=>q.choices[l]);
    answerHtml=`<div class="bb-choices">
      ${letters.map(l=>{
        let cls='';
        if (isAnswered) {
          if (l===q.answer) cls='selected';
          else if (resp===l) cls='wrong';
        } else {
          if (l===sel) cls='selected';
        }
        const circle=isAnswered&&l===q.answer?'✓':isAnswered&&resp===l?'✗':l;
        return `<button class="bb-choice ${cls}" data-letter="${l}" ${isAnswered?'disabled':''}>
          <span class="bb-choice-circle">${circle}</span>
          <span>${q.choices[l]}</span>
        </button>`;
      }).join('')}
    </div>`;
  }

  /* Check if SPR answer is correct */
  let sprCorrect=false;
  if (q.isSPR&&isAnswered) {
    const cleaned=(resp||'').toString().trim().toLowerCase().replace(/\s/g,'');
    const expected=(q.sprAnswer||'').toString().toLowerCase().replace(/\s/g,'');
    if (q.sprAnswerNum!=null) {
      const parsed=parseFloat(cleaned);
      sprCorrect=!isNaN(parsed)&&Math.abs(parsed-q.sprAnswerNum)<0.01;
    }
    if (!sprCorrect) sprCorrect=[expected,expected.replace('π','pi'),expected.replace('π','p')].includes(cleaned);
  }
  const isCorrect = q.isSPR ? sprCorrect : (resp===q.answer);

  const explanationHtml = isAnswered&&q.explanation ? `
    <div style="margin-top:12px;padding:14px 16px;background:${isCorrect?'var(--success-light)':'var(--danger-light)'};border-left:3px solid ${isCorrect?'var(--success)':'var(--danger)'};border-radius:0 var(--radius) var(--radius) 0;font-size:13px;color:var(--text);line-height:1.6;">
      <strong>${isCorrect?'Correct.':q.isSPR?`Incorrect — answer is ${q.sprAnswer}.`:`Incorrect — answer is ${q.answer}.`}</strong> ${q.explanation||''}
    </div>` : '';

  const isLast=S.qIndex===S.questions.length-1;
  const navHtml=`
  <div class="bb-q-nav" style="margin-top:24px;">
    <button class="bb-btn bb-btn-ghost" id="btn-q-prev" ${S.qIndex===0?'disabled':''}>← Back</button>
    ${isLast&&isAnswered
      ?`<button class="bb-btn bb-btn-primary" id="btn-q-finish">See results →</button>`
      :isAnswered
        ?`<button class="bb-btn bb-btn-primary" id="btn-q-next">Next →</button>`
        :q.isSPR
          ?`<button class="bb-btn bb-btn-primary" id="btn-q-check">Check answer</button>`
          :S.selected[q.id]
            ?`<button class="bb-btn bb-btn-primary" id="btn-q-confirm">Confirm answer</button>`
            :''
    }
  </div>`;

  const dots=S.questions.map((qq,i)=>{
    const a=S.responses[qq.id];
    const cls=i===S.qIndex?'current':a!==undefined?'answered':'';
    const isFlagged=S.flags[S.questions[i]?.id]?'flagged':'';
    return `<div class="bb-dot ${cls} ${isFlagged}" data-qi="${i}">${i+1}</div>`;
  }).join('');
  const flagged = S.flags[q.id];
  const flaggedIndices = S.questions.map((qq,i)=>S.flags[qq.id]?i:-1).filter(i=>i>=0);
  const nextFlagged = flaggedIndices.find(i=>i!==S.qIndex) ?? -1;
  const dotsStrip=`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
    <div class="bb-dots-strip" style="margin-bottom:0;">${dots}</div>
    <div style="display:flex;align-items:center;gap:8px;">
      ${flaggedIndices.length>0?`<button class="bb-btn bb-btn-ghost" id="btn-jump-flagged" style="font-size:11px;padding:4px 10px;">⚑ ${flaggedIndices.length} flagged</button>`:''}
      <button class="flag-btn ${flagged?'active':''}" id="btn-flag" title="Flag for review">⚑</button>
    </div>
  </div>`;

  let passageHtml='';
  if (q.dualText) {
    const t1 = typeof q.dualText === 'object' ? q.dualText.text1 : q.passage;
    const t2 = typeof q.dualText === 'object' ? q.dualText.text2 : q.dualText;
    passageHtml=`<div class="bb-panel-tag">Texts</div>
    <div class="bb-dual-wrap">
      <div class="bb-text-block"><div class="bb-text-label">Text 1</div><div class="bb-passage">${t1}</div></div>
      <div class="bb-text-block"><div class="bb-text-label">Text 2</div><div class="bb-passage">${t2}</div></div>
    </div>`;
  } else if (q.notes) {
    passageHtml=`<div class="bb-panel-tag">Notes</div>
    <div class="bb-notes-box">
      <ul>${q.notes.map(n=>`<li>${n}</li>`).join('')}</ul>
      ${q.noteTask?`<div class="bb-notes-task">${q.noteTask}</div>`:''}
    </div>`;
  } else if (q.passage) {
    let txt=q.passage;
    if (q.underline) txt+=` <u>${q.underline}</u>`;
    passageHtml=`<div class="bb-panel-tag">Passage</div><div class="bb-passage">${txt}</div>
    ${q.table?(q.table.trim().startsWith('<')?q.table.replace(/class="data-table"/g,'class="bb-data-table"'):parseTextTable(q.table)):''}`;
  } else if (q.table) {
    passageHtml=`<div class="bb-panel-tag">Data</div>${q.table.replace(/class="data-table"/g,'class="bb-data-table"')}`;
  }

  const typeLabel=(q.type||'').replace(/_/g,' ');
  const stem=q.question||q.text||'';

  if (isMath||!passageHtml) {
    // Add graph and katex handlers for math questions
    if (q.graph && !passageHtml) {
      passageHtml = `<div class="bb-panel-tag">Figure</div><div style="padding:8px 0;">${q.graph}</div>`;
    }
    if (q.katex && !passageHtml) {
      passageHtml = `<div class="bb-panel-tag">Figure / Data</div><div class="bb-passage katex-content" style="font-size:14px;line-height:1.8;">${q.katex}</div>`;
    }
    const calcBtn = isMath
      ? `<button class="bb-btn bb-btn-ghost" onclick="toggleCalc()" style="font-size:12px;padding:6px 12px;margin-left:auto;">🖩 Calculator</button>`
      : '';
    return `
<div class="bb-math-layout">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">${dotsStrip}${calcBtn}</div>
  <div class="bb-math-stem">
    <div style="font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px;">Q${S.qIndex+1} of ${tot} · ${typeLabel}</div>
    ${passageHtml?`<div style="margin-bottom:16px;">${passageHtml}</div>`:''}
    <div class="${q.katex?'katex-content':''}" style="font-size:15px;line-height:1.75;">${stem}</div>
  </div>
  <div class="${q.katex?'katex-content':''}">${answerHtml}</div>
  ${explanationHtml}
  ${navHtml}
</div>
<div id="calc-panel" class="bb-calc-panel" style="display:none;flex-direction:column;">
  <div class="bb-calc-header">
    <span>Calculator</span>
    <button onclick="toggleCalc()" style="background:none;border:none;cursor:pointer;font-size:18px;line-height:1;">×</button>
  </div>
  <iframe src="https://www.desmos.com/scientific" class="bb-calc-iframe" title="Calculator"></iframe>
</div>`;
  }

  return `
<div class="bb-question-layout">
  <div class="bb-left-panel">${passageHtml}</div>
  <div class="bb-divider-line"></div>
  <div class="bb-right-panel">
    ${dotsStrip}
    <div class="bb-q-num">Q${S.qIndex+1} of ${tot} <span class="bb-q-type-badge">${typeLabel}</span></div>
    <div class="bb-question-stem">${stem}</div>
    ${answerHtml}
    ${explanationHtml}
    ${navHtml}
  </div>
</div>`;
}

/* ── Results ───────────────────────────────────────────── */
function htmlResults() {
  /* Count correct using proper scoring for SPR */
  let correct=0;
  S.questions.forEach(q=>{
    const r=S.responses[q.id];
    if (!r) return;
    if (q.isSPR) {
      const cleaned=(r||'').toString().trim().toLowerCase().replace(/\s/g,'');
      const expected=(q.sprAnswer||'').toString().toLowerCase().replace(/\s/g,'');
      if (q.sprAnswerNum!=null) {
        const parsed=parseFloat(cleaned);
        if (!isNaN(parsed)&&Math.abs(parsed-q.sprAnswerNum)<0.01) { correct++; return; }
      }
      if ([expected,expected.replace('π','pi'),expected.replace('π','p')].includes(cleaned)) correct++;
    } else {
      if (r===q.answer) correct++;
    }
  });
  const total=S.questions.length;
  const pct=Math.round((correct/total)*100);

  const msg=pct>=80?'Strong work. Keep drilling harder questions in this domain.'
    :pct>=60?'Solid effort. Review what you missed and look for the pattern.'
    :'This is the data you need. Work through each explanation before retrying.';

  const reviewRows=S.questions.map(q=>{
    const r=S.responses[q.id];
    let ok=false;
    if (q.isSPR) {
      const cleaned=(r||'').toString().trim().toLowerCase().replace(/\s/g,'');
      const expected=(q.sprAnswer||'').toString().toLowerCase().replace(/\s/g,'');
      if (q.sprAnswerNum!=null) { const p=parseFloat(cleaned); ok=!isNaN(p)&&Math.abs(p-q.sprAnswerNum)<0.01; }
      if (!ok) ok=[expected,expected.replace('π','pi'),expected.replace('π','p')].includes(cleaned);
    } else { ok=r===q.answer; }
    return `<div class="dl-review-row">
      <div class="dl-review-icon ${ok?'correct':'wrong'}">${ok?'✓':'✗'}</div>
      <div class="dl-review-q">Q${S.questions.indexOf(q)+1} — ${(q.type||'').replace(/_/g,' ')}
        ${!ok?`<div style="font-size:12px;color:var(--text-dim);margin-top:2px;">Your answer: ${r||'—'} &nbsp; Correct: ${q.isSPR?q.sprAnswer:q.answer}</div>`:''}
      </div>
    </div>`;
  }).join('');

  return `
<div class="dl-results">
  <div class="dl-results-score">${correct}/${total}</div>
  <div class="dl-results-label">${pct}% · ${DOMAIN_META[S.domain]?.name||S.domain}</div>
  <p style="font-size:14px;color:var(--text-muted);margin-bottom:28px;line-height:1.6;">${msg}</p>
  <div class="dl-results-breakdown">${reviewRows}</div>
  <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
    <button class="bb-btn bb-btn-primary" onclick="retryDomain()">Try again</button>
    <button class="bb-btn bb-btn-ghost" onclick="S.view='picker';render()">Pick another domain</button>
    <a href="daniellab_mocktest.html" class="bb-btn bb-btn-secondary">Full mock test →</a>
  </div>
</div>`;
}

/* ── Events ─────────────────────────────────────────────── */
function bindEvents() {
  const on    =(id,ev,fn)=>{ const el=document.getElementById(id); if(el) el.addEventListener(ev,fn); };
  const onAll =(sel,ev,fn)=>document.querySelectorAll(sel).forEach(el=>el.addEventListener(ev,fn));

  if (S.view==='quiz') {
    const q=S.questions[S.qIndex];
    if (!q) return;

    if (!q.isSPR) {
      onAll('.bb-choice:not([disabled])','click',e=>{
        if (S.responses[q.id]) return;
        S.selected[q.id]=e.currentTarget.dataset.letter;
        render();
      });
      on('btn-q-confirm','click',()=>{
        if (!S.selected[q.id]) return;
        recordQuestionEnd(q.id);
        S.responses[q.id]=S.selected[q.id];
        render();
      });
    }
    if (q.isSPR) {
      on('btn-q-check','click',()=>{
        const inp=document.getElementById('spr-input');
        if (!inp||!inp.value.trim()) return;
        recordQuestionEnd(q.id);
        S.responses[q.id]=inp.value.trim();
        render();
      });
    }
    on('btn-flag','click',()=>{ S.flags[q.id]=!S.flags[q.id]; render(); });
     on('btn-jump-flagged','click',()=>{
      const flaggedIndices = S.questions.map((qq,i)=>S.flags[qq.id]?i:-1).filter(i=>i>=0);
      if (!flaggedIndices.length) return;
      const currentPos = flaggedIndices.indexOf(S.qIndex);
      const next = flaggedIndices[(currentPos + 1) % flaggedIndices.length];
      S.qIndex=next; render();
    });
    on('btn-q-prev','click',()=>{ if(S.qIndex>0){S.qIndex--;render();} });
    on('btn-q-next','click',()=>{ S.qIndex++; render(); });
    on('btn-q-finish','click',()=>{ saveResults(); S.view='results'; render(); });
    onAll('.bb-dot[data-qi]','click',e=>{ S.qIndex=parseInt(e.currentTarget.dataset.qi,10); render(); });
    initHighlighter();
  }

  on('btn-exit-save','click', async ()=>{
    if (S.view==='quiz' && Object.keys(S.responses).length > 0) {
      await saveResults();
    }
    window.location.href='daniellab_student.html';
  });
}

function initHighlighter() {
  let activeColor = null; // 'yellow' | 'green' | null

  function setActive(color) {
    activeColor = activeColor === color ? null : color;
    const yBtn = document.getElementById('hl-yellow');
    const gBtn = document.getElementById('hl-green');
    if (yBtn) yBtn.style.outline = activeColor==='yellow' ? '2px solid #fff' : 'none';
    if (gBtn) gBtn.style.outline = activeColor==='green'  ? '2px solid #fff' : 'none';
    document.body.style.cursor = activeColor ? 'text' : '';
  }

  document.getElementById('hl-yellow')?.addEventListener('click', () => setActive('yellow'));
  document.getElementById('hl-green')?.addEventListener('click',  () => setActive('green'));
  document.getElementById('hl-clear')?.addEventListener('click',  () => {
    const inPassage = document.querySelector('.bb-passage,.bb-notes-box');
    if (inPassage) {
      inPassage.querySelectorAll('mark.hl-yellow,mark.hl-green').forEach(mark => {
        const parent = mark.parentNode;
        while (mark.firstChild) parent.insertBefore(mark.firstChild, mark);
        parent.removeChild(mark);
        parent.normalize();
      });
    }
    setActive(null);
  });
  document.getElementById('hl-clear')?.addEventListener('click',  () => {
    window.getSelection().removeAllRanges();
    setActive(null);
  });

  document.addEventListener('mouseup', e => {
    if (e.target.closest('#hl-toolbar')) return;
    if (!activeColor) return;

    const sel = window.getSelection();
    if (!sel || sel.isCollapsed) return;

    const range = sel.getRangeAt(0);
    const container = range.commonAncestorContainer;
    const inPassage = container.nodeType === 3
      ? container.parentElement?.closest('.bb-passage,.bb-notes-box')
      : container.closest?.('.bb-passage,.bb-notes-box');
    if (!inPassage) { sel.removeAllRanges(); return; }

    // Remove any existing highlights in range first
    const existingMarks = inPassage.querySelectorAll('mark.hl-yellow,mark.hl-green');
    existingMarks.forEach(mark => {
      if (range.intersectsNode(mark)) {
        const parent = mark.parentNode;
        while (mark.firstChild) parent.insertBefore(mark.firstChild, mark);
        parent.removeChild(mark);
        parent.normalize();
      }
    });

    // Re-get selection after DOM change
    sel.removeAllRanges();
    const newRange = range.cloneRange();

    // Check if selection now covers text — if original was purely a removal, stop
    if (newRange.collapsed) return;

    const mark = document.createElement('mark');
    mark.className = activeColor === 'yellow' ? 'hl-yellow' : 'hl-green';
    try { newRange.surroundContents(mark); }
    catch {
      const frag = newRange.extractContents();
      mark.appendChild(frag);
      newRange.insertNode(mark);
    }
    sel.removeAllRanges();
  });
}

/* ── Helpers ─────────────────────────────────────────────── */
function toggleCalc() {
  const p = document.getElementById('calc-panel');
  if (p) p.style.display = p.style.display === 'none' ? 'flex' : 'none';
}

function retryDomain() {
  S.questions=shuffle([...(QUESTION_BANK[S.domain]||[])]);
  S.qIndex=0; S.responses={}; S.selected={}; S.responseTimes={}; S.flags={}; S.highlights={};
  S.sessionId=crypto.randomUUID();
  S.view='quiz'; render();
}

async function saveResults() {
  const {url,key}=getConfig();
  if (!url||!key) return;

  const rows = S.questions.map(q => {
    const r = S.responses[q.id];
    let isCorrect = false;
    if (r) {
      if (q.isSPR) {
        const c=(r||'').toString().trim().toLowerCase().replace(/\s/g,'');
        const e=(q.sprAnswer||'').toString().toLowerCase().replace(/\s/g,'');
        if (q.sprAnswerNum!=null){const p=parseFloat(c);if(!isNaN(p)&&Math.abs(p-q.sprAnswerNum)<0.01){isCorrect=true;}}
        if (!isCorrect) isCorrect=[e,e.replace('π','pi'),e.replace('π','p')].includes(c);
      } else {
        isCorrect = r===q.answer;
      }
    }
    return {
      student_id:       studentId,
      session_id:       S.sessionId,
      session_type:     'practice',
      question_id:      q.id,
      domain:           q.domain,
      question_type:    q.type,
      student_answer:   r||null,
      correct_answer:   q.isSPR ? q.sprAnswer : q.answer,
      is_correct:       r ? isCorrect : null,
      time_on_question: S.responseTimes[q.id]||null,
    };
  });

  const correct = rows.filter(r=>r.is_correct).length;

  // Save aggregate to practice_results
  await sbPost('practice_results',{
    student_id: studentId,
    domain:     S.domain,
    score:      correct,
    total:      S.questions.length,
  });

  // Save per-response rows
  await fetch(`${url}/rest/v1/responses`,{
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':key,'Authorization':`Bearer ${key}`,'Prefer':'return=minimal'},
    body: JSON.stringify(rows),
  });
}

function parseTextTable(text) {
  if (!text) return '';
  const lines = text.trim().split('\n').filter(l => l.trim() && !l.match(/^[-|:\s]+$/));
  if (lines.length < 2) return `<p style="font-size:14px;color:var(--text-muted)">${text}</p>`;
  const rows = lines.map(l => l.split('|').map(c => c.trim()).filter(c => c !== ''));
  const [header, ...body] = rows;
  return `<table class="bb-data-table">
    <thead><tr>${header.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
    <tbody>${body.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody>
  </table>`;
}

function shuffle(arr) {
  for (let i=arr.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}
