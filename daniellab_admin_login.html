<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DanielLab · Admin Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
:root {
  --bg:        #f5f4f2;
  --surface:   #ffffff;
  --border:    #e2e0dc;
  --accent:    #c8102e;
  --accent-dim:#a30d25;
  --text:      #111111;
  --muted:     #888888;
  --radius:    10px;
  --sans:      'DM Sans', sans-serif;
  --serif:     'DM Serif Display', serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.login-wrap {
  width: 100%;
  max-width: 400px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 32px;
}
.logo {
  font-family: var(--sans);
  font-size: 1.3rem;
  font-weight: 400;
  text-align: center;
  line-height: 1;
}
.logo .bold { color: var(--accent); font-weight: 700; }
.logo .sub  { display: block; font-size: 0.65rem; color: var(--muted); letter-spacing: .08em; margin-top: 4px; }
.card {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 36px 32px 32px;
}
.card-title { font-family: var(--serif); font-size: 1.6rem; margin-bottom: 6px; }
.card-sub   { font-size: 0.85rem; color: var(--muted); margin-bottom: 28px; line-height: 1.5; }
.field { margin-bottom: 16px; }
label {
  display: block;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}
input {
  font-family: var(--sans);
  font-size: 1rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--text);
  padding: 12px 14px;
  width: 100%;
  outline: none;
  transition: border-color 0.15s;
}
input:focus { border-color: var(--accent); }
input::placeholder { color: var(--muted); }
.btn-login {
  font-family: var(--sans);
  font-size: 0.95rem;
  font-weight: 600;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 14px;
  width: 100%;
  cursor: pointer;
  margin-top: 8px;
  transition: background 0.15s;
}
.btn-login:hover    { background: var(--accent-dim); }
.btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
.error-msg {
  font-size: 0.82rem;
  color: var(--accent);
  background: rgba(200,16,46,0.05);
  border: 1px solid rgba(200,16,46,0.15);
  border-radius: 6px;
  padding: 10px 12px;
  margin-top: 14px;
  display: none;
}
.error-msg.visible { display: block; }
.footer-note { font-size: 0.75rem; color: var(--muted); text-align: center; }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="logo">
    The<span class="bold">Daniel</span>Lab
    <span class="sub">Admin Portal</span>
  </div>

  <div class="card">
    <h1 class="card-title">Admin login</h1>
    <p class="card-sub">Sign in with your admin email and password.</p>

    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com"
             autocomplete="email"
             onkeydown="if(event.key==='Enter') document.getElementById('password').focus()" />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••"
             autocomplete="current-password"
             onkeydown="if(event.key==='Enter') attemptLogin()" />
    </div>

    <button class="btn-login" id="login-btn" onclick="attemptLogin()">Sign in</button>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <div class="footer-note">Admin access only. Students use the <a href="index.html" style="color:var(--accent);">student portal</a>.</div>
</div>

<script>
function getConfig() {
  return {
    url: (typeof CONFIG !== 'undefined' && CONFIG.SUPABASE_URL) || localStorage.getItem('dl_sb_url') || '',
    key: (typeof CONFIG !== 'undefined' && CONFIG.SUPABASE_KEY) || localStorage.getItem('dl_sb_key') || '',
  };
}

async function attemptLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('login-btn');
  const errEl    = document.getElementById('error-msg');

  errEl.classList.remove('visible');

  if (!email || !password) {
    showError('Please enter your email and password.');
    return;
  }

  const { url, key } = getConfig();
  if (!url || !key) {
    showError('Supabase not configured. Contact Kevin.');
    return;
  }

  btn.disabled    = true;
  btn.textContent = 'Signing in…';

  try {
    const { createClient } = window.supabase;
    const client = createClient(url, key);

    const { data, error } = await client.auth.signInWithPassword({ email, password });

    if (error) {
      showError('Incorrect email or password.');
      return;
    }

    /* Verify the user is in the admins table */
    const res = await fetch(
      `${url}/rest/v1/admins?id=eq.${data.user.id}&select=name,role`,
      {
        headers: {
          'apikey': key,
          'Authorization': `Bearer ${data.session.access_token}`,
        }
      }
    );
    const admins = await res.json();

    if (!admins || admins.length === 0) {
      await client.auth.signOut();
      showError('Your account does not have admin access.');
      return;
    }

    /* Store name/role for display in dashboard */
    sessionStorage.setItem('dl_admin_name', admins[0].name);
    sessionStorage.setItem('dl_admin_role', admins[0].role);

    window.location.href = 'daniellab_dashboard.html';

  } catch (e) {
    showError(e.message || 'Login failed. Try again.');
  } finally {
    btn.disabled    = false;
    btn.textContent = 'Sign in';
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('visible');
}
</script>

<footer style="position:fixed;bottom:0;width:100%;text-align:center;padding:16px;font-size:0.72rem;color:#aaa;letter-spacing:0.04em;">Developed by Kevin Choi &nbsp;·&nbsp; Powered by SENECA AI</footer>
</body>
</html>
